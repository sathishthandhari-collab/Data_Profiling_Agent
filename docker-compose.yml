services:
  spark-master:
    image: apache/spark:3.5.0
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./data:/opt/spark/work-dir/data

  spark-worker:
    image: apache/spark:3.5.0
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/spark/work-dir/data

  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SPARK_MASTER=local[*]
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=gemini/gemini-3.0-flash
      - DATA_PATH=/data
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
      - DATABRICKS_CATALOG=${DATABRICKS_CATALOG}
      - DATABRICKS_SCHEMA=${DATABRICKS_SCHEMA}
    volumes:
      - .:/app
      - ./data:/data
    depends_on:
      - spark-master

  ui:
    build: .
    command: ["streamlit", "run", "src/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://agent:8000 
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATA_PATH=/data
    volumes:
      - .:/app
      - ./data:/data
    depends_on:
      - agent
